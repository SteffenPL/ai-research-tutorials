    hidden: true

  # Resolution — calibration fix
  - round: 1
    step: 90
    comment:
      en: >-
        The root cause: the microscope embedded spatial calibration in the image,
        so Analyze Particles' size filter (in calibrated units) silently excluded
        everything. Removing calibration and filtering in pixels fixes it.
      ja: >-
        根本原因：顕微鏡が画像に空間キャリブレーションを埋め込んでいたため、
        Analyze Particles のサイズフィルター（キャリブレーション単位）が
        すべてを黙って除外していました。キャリブレーションを解除し
        ピクセル単位でフィルタリングすると解決します。

  - round: 1
    step: 91
    comment:
      en: >-
        The final pipeline: remove calibration, set threshold, run Analyze
        Particles with pixel-based size filters (100–5000 px), circularity
        filter (0.3–1.0), and exclude edge-touching objects.
      ja: >-
        最終パイプライン：キャリブレーション解除、閾値設定、ピクセルベースの
        サイズフィルター（100–5000 px）、真円度フィルター（0.3–1.0）、
        エッジ接触オブジェクト除外で Analyze Particles を実行。
    override:
      code: |-
        // Remove spatial calibration — sizes in pixels
        selectWindow("best_mask");
        run("Properties...", "unit=pixel pixel_width=1 pixel_height=1");
        setThreshold(128, 255);

        roiManager("Reset");
        run("Set Measurements...",
            "area mean centroid shape display redirect=None decimal=2");
        run("Analyze Particles...",
            "size=100-5000 circularity=0.30-1.00 show=Nothing "
          + "display exclude clear add");
        n = roiManager("count");
        print("Nuclei detected: " + n);

        // Overlay ROIs on the original
        selectWindow("Osteosarcoma_01.tif");
        roiManager("Show All without labels");
        run("Flatten");
        rename("nuclei_segmentation_result");

  - round: 1
    step: 92
    compact: true

  # Final result
  - round: 1
    step: 97
    comment:
      en: >-
        The final result: 103 nuclei outlined in cyan on the original RGB
        image. Each nucleus is an individual ROI in Fiji's ROI Manager,
        with area, centroid, and shape measurements in the Results table.
      ja: >-
        最終結果：元の RGB 画像上に 103 個の核がシアンで縁取りされています。
        各核は Fiji の ROI Manager の個別 ROI として、面積、重心、
        形状測定値が Results テーブルに記録されています。
    override:
      windowTitle: "Nuclei Segmentation Result"
      subtitle: "103 nuclei — Osteosarcoma_01.tif"
      content:
        kind: fiji-image
        src: step_014.png
        statusBar: "103 nuclei detected · Approach #9"

  # Summary
  - round: 1
    step: 101
    comment:
      en: >-
        The full pipeline from raw image to quantified results — two prompts,
        10 approaches tested and compared, debugging included. This is the
        kind of systematic exploration that MCP-driven analysis enables.
      ja: >-
        生画像から定量結果までの完全なパイプライン — 2 つのプロンプト、
        10 手法のテストと比較、デバッグを含む。これが MCP 駆動型分析が
        可能にする体系的な探索です。

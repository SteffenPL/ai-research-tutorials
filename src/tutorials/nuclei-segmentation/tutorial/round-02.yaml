    hidden: true
  - type: tool_result
    text: >-
      {"status":"completed","stdout":"Detected nuclei:
      0\n","stderr":"","value":null,"error":null,"duration_ms":20,"execution_id":null,"active_image":"mask_for_analysis","dismissed_dialogs":[],"results_snapshot":null}

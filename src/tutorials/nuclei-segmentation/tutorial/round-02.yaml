      of
      approach_09_morph\nresult_segmentation\nmask_for_analysis\nfinal_mask\n","stderr":"","value":null,"error":null,"duration_ms":1,"execution_id":null,"active_image":"approach_09_morph","dismissed_dialogs":[],"results_snapshot":null}

      selectWindow("approach_09_morph");

      run("Analyze Particles...", "size=50-Infinity circularity=0.3-1.00 show=Outlines display
      exclude clear add");


      // Overlay ROIs on the original image

      selectWindow("Osteosarcoma_01.tif");

      roiManager("Show All with labels");
